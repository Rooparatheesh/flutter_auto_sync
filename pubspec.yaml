name: flutter_auto_sync
description: A Flutter package for offline data storage and automatic API synchronization when internet connectivity is restored.
version: 0.0.4

homepage: https://github.com/Rooparatheesh/flutter_auto_sync
repository: https://github.com/Rooparatheesh/flutter_auto_sync
issue_tracker: https://github.com/Rooparatheesh/flutter_auto_sync/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

topics:
  - offline
  - sync
  - networking
  - storage

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  http: ^1.6.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2